# =============================================================================
# Ruff — Python Linter & Formatter
# https://docs.astral.sh/ruff/
# =============================================================================

target-version = "py313"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # flake8-bugbear (common bugs)
    "S",    # flake8-bandit (security)
    "T20",  # flake8-print (no print statements)
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "S101",   # allow assert in tests
    "T201",   # allow print in scripts
    "E501",   # line length handled by formatter
    "B008",   # Depends() in fastapi
    "B027",   # empty methods in base classes
    "B007",   # unused loop variables
    "S110",   # try-except-pass
    "RUF003", # ambiguous en-dash in comments
]

[lint.per-file-ignores]
"**/tests/**/*.py" = [
    "S101",   # assert is fine in tests
    "S105",   # hardcoded passwords in test fixtures
    "S106",   # hardcoded passwords in test arguments
    "S107",   # hardcoded passwords in test defaults
]
"examples/**/*.py" = [
    "S105",   # dev-mode fallback API key strings
    "S106",   # dev-mode fallback passed as keyword arg
    "S107",   # dev-mode fallback in default
]
"scripts/**/*.py" = [
    "T201",   # print is fine in scripts
]

[lint.isort]
known-first-party = ["app", "novisentinel"]
