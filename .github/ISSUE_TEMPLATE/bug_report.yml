name: Bug Report
description: Something isn't working as expected.
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. The scan endpoint returns 500 when the text contains emoji..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce. Include a curl command or code snippet if possible.
      placeholder: |
        1. POST /v1/scan with body `{"text": "..."}`
        2. Observe response
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API / backend
        - Python SDK
        - VS Code extension
        - Dashboard
        - Browser extension
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NoviSentinel version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant logs. They will be formatted as code automatically.
      render: shell
    validations:
      required: false
