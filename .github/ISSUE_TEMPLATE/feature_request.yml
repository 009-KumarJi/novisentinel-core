name: Feature Request
description: Suggest a new feature or improvement.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem you're solving
      description: What is the pain point? What can't you do today?
      placeholder: "e.g. When I scan a long streaming response, I have to buffer the whole thing before calling the SDK..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What you'd like
      description: Describe the feature. Include API shape, config options, or UX if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried? Why don't they work?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API / backend
        - Python SDK
        - VS Code extension
        - Dashboard
        - Browser extension
        - Examples / docs
        - Other
    validations:
      required: true
