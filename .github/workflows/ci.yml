name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

# Principle of least privilege — CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Test (Python)
    runs-on: ubuntu-latest

    env:
      SPACY_MODEL: en_core_web_lg
      INJECTION_MODEL: protectai/deberta-v3-base-prompt-injection-v2
      INJECTION_THRESHOLD: "0.85"
      TOXICITY_ENABLED: "true"
      TOXICITY_MODEL: original
      TOXICITY_THRESHOLD_SEVERE: "0.5"
      TOXICITY_THRESHOLD_HIGH: "0.7"
      TOXICITY_THRESHOLD_MEDIUM: "0.8"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip wheels
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py313-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py313-pip-

      - name: Cache spaCy model
        uses: actions/cache@v5
        with:
          path: ~/.cache/spacy
          key: ${{ runner.os }}-spacy-en_core_web_lg-3

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .
